# MAIN MODEL
model: gemini/gemini-3.1-flash-lite-preview

# API KEYS
api-key:
#  - deepseek=sk_your_actual_deepseek_key_here
  - gemini=AIza_your_actual_gemini_key_here

# AI CONTROL
map-tokens: 1024 
cache-prompts: true
architect: true
edit-format: architect

# OUTPUT & UI
pretty: true
stream: true
dark-mode: true
show-diffs: true

# AI INSTRUCTIONS
read: ~/.aider.instructions.md

# GIT
gitignore: true
auto-commits: false

# MCP SERVERS
mcp-server:
  - npx -y @modelcontextprotocol/server-duckduckgo
